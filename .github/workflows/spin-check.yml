name: Daily Spin ID Check

on:
  schedule:
    # 16:37 UTC daily (~12:37pm ET). Off-the-hour and off a 5-minute
    # boundary on purpose: GitHub Actions schedules queue up most at
    # round times (:00, :05, :10, ...), so an odd minute avoids the
    # heaviest congestion and delay.
    - cron: "37 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wof-spin-id-check
    steps:
      - uses: actions/checkout@v4

      - name: Run spin ID check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 check_spin_id.py --log spin_log.txt

      - name: Commit log entry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spin_log.txt
          git diff --cached --quiet || git commit -m "Spin ID check: $(date -u +%F)"
          git push
