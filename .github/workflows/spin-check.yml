name: Daily Spin ID Check

on:
  schedule:
    # 16:00 UTC daily (~12pm ET). GitHub may delay scheduled runs by
    # several minutes during busy periods.
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run spin ID check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 check_spin_id.py --log spin_log.txt

      - name: Commit log entry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spin_log.txt
          git diff --cached --quiet || git commit -m "Spin ID check: $(date -u +%F)"
          git push
