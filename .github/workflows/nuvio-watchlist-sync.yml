name: Weekly Nuvio Watchlist Sync

on:
  schedule:
    # 14:23 UTC every Monday (~10:23am ET). Off-the-hour and off a
    # 5-minute boundary on purpose: GitHub Actions schedules queue up
    # most at round times (:00, :05, :10, ...), so an odd minute avoids
    # the heaviest congestion and delay.
    - cron: "23 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuvio-watchlist-sync
    steps:
      - uses: actions/checkout@v4

      - name: Back up Nuvio watchlists
        env:
          NUVIO_EMAIL: ${{ secrets.NUVIO_EMAIL }}
          NUVIO_PASSWORD: ${{ secrets.NUVIO_PASSWORD }}
        run: python3 backup_watchlists.py

      - name: Commit backup changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlists
          git diff --cached --quiet || git commit -m "Nuvio watchlist sync: $(date -u +%F)"
          # The checkout can be behind origin/master (re-runs pin the
          # trigger-time SHA; another workflow may have pushed since),
          # so rebase our commit onto the current remote tip first.
          git pull --rebase origin master
          git push
