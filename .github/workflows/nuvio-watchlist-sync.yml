name: Weekly Nuvio Watchlist Sync

on:
  schedule:
    # 14:23 UTC every Monday (~10:23am ET). Off-the-hour and off a
    # 5-minute boundary on purpose: GitHub Actions schedules queue up
    # most at round times (:00, :05, :10, ...), so an odd minute avoids
    # the heaviest congestion and delay.
    - cron: "23 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuvio-watchlist-sync
    steps:
      - uses: actions/checkout@v4

      - name: Back up Nuvio watchlists
        env:
          NUVIO_EMAIL: ${{ secrets.NUVIO_EMAIL }}
          NUVIO_PASSWORD: ${{ secrets.NUVIO_PASSWORD }}
        run: python3 backup_watchlists.py

      - name: Commit backup changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlists
          git diff --cached --quiet || git commit -m "Nuvio watchlist sync: $(date -u +%F)"
          # The checkout can be behind origin/master (re-runs pin the
          # trigger-time SHA; another workflow may have pushed since),
          # so rebase our commit onto the current remote tip first.
          git pull --rebase origin master
          git push

  recommendations:
    needs: backup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuvio-watchlist-sync
    steps:
      - uses: actions/checkout@v4
        with:
          # Pick up the commit the backup job just pushed, not the
          # SHA that triggered the workflow.
          ref: master

      - name: Generate recommendations
        # Recommendations are best-effort: a TMDB hiccup should not
        # fail the workflow now that it's decoupled from the backup.
        continue-on-error: true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          # For pulling every profile's watch history as extra seeds.
          NUVIO_EMAIL: ${{ secrets.NUVIO_EMAIL }}
          NUVIO_PASSWORD: ${{ secrets.NUVIO_PASSWORD }}
        run: |
          if [ -z "$TMDB_API_KEY" ]; then
            echo "TMDB_API_KEY secret not set; skipping recommendations."
          else
            python3 generate_recommendations.py
          fi

      - name: Commit recommendations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f recommendations.txt ]; then git add recommendations.txt; fi
          git diff --cached --quiet || git commit -m "Nuvio recommendations: $(date -u +%F)"
          git pull --rebase origin master
          git push
